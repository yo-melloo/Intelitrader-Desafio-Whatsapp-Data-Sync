# - Bloco obrigatório — mesmo vazio, o Nginx se recusa a iniciar sem ele.
# - Controla o modelo de conexões (worker_connections, etc).
events {}

# - http é o contexto principal que engloba todas as configurações HTTP
http {
  # - O bloco server define um servidor virtual único
  server {
    # - Escuta na porta 80 (mapeada pelo docker-compose "80:80")
    listen 80;

    # - "/" captura TODAS as requisições (incluindo o dashboard na raiz).
    # - Se você tentar acessar /dashboard, o Next.js dará 404 pois ele está na raiz (/).
    location / {
      proxy_pass http://frontend:3000;
    }

    # - Otimização para assets do Next.js e HMR
    location /_next/ {
      proxy_pass http://frontend:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location /api/ {
      proxy_pass http://backend:5000;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_cache off;
      chunked_transfer_encoding off;
    }
  }
}